<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Find My Appointments</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <div class="brand-badge">User Lookup</div>
            <h1 class="page-title mb-2">Find My Appointments</h1>
            <p class="page-subtitle">Enter your email and phone number to access your appointment records.</p>

            <form th:action="@{/my-appointments}" method="post">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" name="phoneNumber" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary">Find My Appointments</button>
                <a href="/" class="btn btn-outline-secondary ms-2">Back</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
