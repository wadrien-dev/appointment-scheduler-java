<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Access Denied</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4 text-center">
            <div class="text-center">
                <div class="brand-badge">Access Control</div>
                <h1 class="page-title text-danger mb-2">Access Denied</h1>
                <p class="page-subtitle" th:text="${errorMessage}">You are not authorized to access this page.</p>
            </div>

            <p th:text="${errorMessage}">You are not authorized to access this page.</p>
            <a href="/" class="btn btn-primary mt-3">Back to Home</a>
        </div>
    </div>
</div>
</body>
</html>
