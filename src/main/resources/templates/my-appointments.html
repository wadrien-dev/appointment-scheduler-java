<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Appointments</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h1 class="mb-4">My Appointments</h1>

            <div th:if="${appointments.isEmpty()}" class="alert alert-warning">
                No appointments were found for the provided email and phone number.
            </div>

            <div th:if="${!appointments.isEmpty()}">
                <table class="table table-striped align-middle">
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Reason</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="appointment : ${appointments}">
                        <td th:text="${appointment.fullName}"></td>
                        <td th:text="${appointment.email}"></td>
                        <td th:text="${appointment.phoneNumber}"></td>
                        <td th:text="${appointment.appointmentDate}"></td>
                        <td th:text="${appointment.appointmentTime}"></td>
                        <td th:text="${appointment.reason}"></td>
                        <td th:text="${appointment.status}"></td>
                        <td>
                            <div th:if="${appointment.status != 'Cancelled'}">
                                <form th:action="@{/my-appointments/cancel/{id}(id=${appointment.id})}"
                                      method="post" style="display:inline;">

                                <form th:action="@{/appointments/cancel/{id}(id=${appointment.id})}"
                                      method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-danger"
                                            onclick="return confirm('Are you sure you want to cancel this appointment?');">
                                        Cancel
                                    </button>
                                </form>
                            </div>

                            <div th:if="${appointment.status == 'Cancelled'}">
                                <span class="text-muted">No actions available</span>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <a href="/my-appointments" class="btn btn-primary">Search Again</a>
            <a href="/" class="btn btn-outline-secondary ms-2">Back to Scheduler</a>
        </div>
    </div>
</div>
</body>
</html>
