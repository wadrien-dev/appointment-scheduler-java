<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Edit Appointment</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h1 class="mb-4">Admin Edit Appointment</h1>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/admin/appointments/update/{id}(id=${appointment.id})}"
                  th:object="${appointment}" method="post">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" th:field="*{fullName}" class="form-control">
                    <div class="text-danger" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control">
                    <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" th:field="*{phoneNumber}" class="form-control">
                    <div class="text-danger" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Appointment Date</label>
                    <input type="date"
                           name="appointmentDate"
                           th:value="${#temporals.format(appointment.appointmentDate, 'yyyy-MM-dd')}"
                           class="form-control">
                    <div class="text-danger" th:if="${#fields.hasErrors('appointmentDate')}" th:errors="*{appointmentDate}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Appointment Time</label>
                    <input type="time" th:field="*{appointmentTime}" class="form-control">
                    <div class="text-danger" th:if="${#fields.hasErrors('appointmentTime')}" th:errors="*{appointmentTime}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Reason</label>
                    <textarea th:field="*{reason}" class="form-control"></textarea>
                    <div class="text-danger" th:if="${#fields.hasErrors('reason')}" th:errors="*{reason}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select th:field="*{status}" class="form-select">
                        <option value="Scheduled">Scheduled</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success">Save Changes</button>
                <a href="/admin" class="btn btn-secondary ms-2">Back to Dashboard</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
