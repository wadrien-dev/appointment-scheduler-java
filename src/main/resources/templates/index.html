<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Appointment Scheduler</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="mb-4">Appointment Scheduler</h1>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/schedule}" th:object="${appointment}" method="post">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" th:field="*{fullName}" class="form-control">
                    <div class="text-danger" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control">
                    <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" th:field="*{phoneNumber}" class="form-control">
                    <div class="text-danger" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Appointment Date</label>
                    <input type="date" th:field="*{appointmentDate}" class="form-control" id="appointmentDate">
                    <div class="text-danger" th:if="${#fields.hasErrors('appointmentDate')}" th:errors="*{appointmentDate}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Appointment Time</label>
                    <input type="time" th:field="*{appointmentTime}" class="form-control">
                    <div class="text-danger" th:if="${#fields.hasErrors('appointmentTime')}" th:errors="*{appointmentTime}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Reason</label>
                    <textarea th:field="*{reason}" class="form-control"></textarea>
                    <div class="text-danger" th:if="${#fields.hasErrors('reason')}" th:errors="*{reason}"></div>
                </div>

                <button type="submit" class="btn btn-primary">Schedule Appointment</button>
                <a href="/appointments" class="btn btn-outline-secondary ms-2">View Appointments</a>
                <a href="/admin" class="btn btn-outline-dark ms-2">Admin Dashboard</a>
                <a href="/my-appointments" class="btn btn-outline-info ms-2">Find My Appointments</a>
            </form>
        </div>
    </div>
</div>
<script>
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('appointmentDate').setAttribute('min', today);
</script>
</body>
</html>
