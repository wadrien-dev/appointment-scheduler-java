<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Appointment</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="mb-4">Edit Appointment</h1>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <form th:action="@{/appointments/update/{id}(id=${appointment.id})}" th:object="${appointment}" method="post">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" th:field="*{fullName}" class="form-control">
                    <div class="text-danger" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control">
                    <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Appointment Date</label>
                    <input type="date" th:field="*{appointmentDate}" class="form-control" id="appointmentDate">
                    <div class="text-danger" th:if="${#fields.hasErrors('appointmentDate')}" th:errors="*{appointmentDate}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Appointment Time</label>
                    <input type="time" th:field="*{appointmentTime}" class="form-control">
                    <div class="text-danger" th:if="${#fields.hasErrors('appointmentTime')}" th:errors="*{appointmentTime}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Reason</label>
                    <textarea th:field="*{reason}" class="form-control"></textarea>
                    <div class="text-danger" th:if="${#fields.hasErrors('reason')}" th:errors="*{reason}"></div>
                </div>

                <input type="hidden" th:field="*{status}"/>

                <button type="submit" class="btn btn-success">Update Appointment</button>
                <a href="/appointments" class="btn btn-secondary ms-2">Back</a>
            </form>
        </div>
    </div>
</div>
<script>
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('appointmentDate').setAttribute('min', today);
</script>
</body>
</html>
