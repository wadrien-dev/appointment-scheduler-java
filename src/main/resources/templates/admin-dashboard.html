<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="mb-4">
        <div class="brand-badge">Admin Dashboard</div>
        <!-- Overview of appointment activity -->
        <h1 class="page-title mb-2">Appointment Overview</h1>
        <p class="page-subtitle">Track scheduling activity and manage appointment records.</p>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body dashboard-stat">
                    <h5 class="card-title">Total Appointments</h5>
                    <h2 th:text="${totalAppointments}"></h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body dashboard-stat">
                    <h5 class="card-title">Scheduled</h5>
                    <h2 th:text="${scheduledAppointments}"></h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-body dashboard-stat">
                    <h5 class="card-title">Cancelled</h5>
                    <h2 th:text="${cancelledAppointments}"></h2>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <h4 class="mb-3">All Appointments</h4>
            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Reason</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="appointment : ${appointments}">
                    <td th:text="${appointment.fullName}"></td>
                    <td th:text="${appointment.email}"></td>
                    <td th:text="${appointment.phoneNumber}"></td>
                    <td th:text="${appointment.appointmentDate}"></td>
                    <td th:text="${appointment.appointmentTime}"></td>
                    <td th:text="${appointment.reason}"></td>
                    <td th:text="${appointment.status}"></td>
                    <td>
                        <a th:href="@{/admin/appointments/edit/{id}(id=${appointment.id})}"
                           class="btn btn-sm btn-warning me-2">Edit</a>

                        <span th:if="${appointment.status != 'Cancelled'}">
                            <form th:action="@{/admin/appointments/cancel/{id}(id=${appointment.id})}"
                                  method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Are you sure you want to cancel this appointment?');">
                                    Cancel
                                </button>
                            </form>
                        </span>

                                            <span th:if="${appointment.status == 'Cancelled'}" class="text-muted">
                            No cancel action
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>

            <a href="/" class="btn btn-primary">Back to Scheduler</a>
            <a href="/appointments" class="btn btn-outline-secondary ms-2">View All Appointments</a>
            <a href="/admin/logout" class="btn btn-outline-danger ms-2">Admin Logout</a>
        </div>
    </div>
</div>
</body>
</html>
